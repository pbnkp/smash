<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- comet trail: transparent left → gold right -->
    <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="trail2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#fde68a" stop-opacity="0"/>
      <stop offset="75%"  stop-color="#fde68a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0.5"/>
    </linearGradient>
    <!-- head core: white-hot center, amber fade -->
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="25%"  stop-color="#fef3c7"/>
      <stop offset="60%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <!-- outer glow -->
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="500" fill="#000000"/>

  <!-- stars -->
  <circle cx="72"  cy="88"  r="1.5" fill="white" opacity="0.6"/>
  <circle cx="148" cy="48"  r="1"   fill="white" opacity="0.4"/>
  <circle cx="312" cy="62"  r="1.5" fill="white" opacity="0.5"/>
  <circle cx="438" cy="110" r="1"   fill="white" opacity="0.35"/>
  <circle cx="55"  cy="390" r="1"   fill="white" opacity="0.3"/>
  <circle cx="460" cy="340" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="200" cy="438" r="1"   fill="white" opacity="0.3"/>

  <!-- main trail body -->
  <path d="M 28 218 C 100 230 220 242 370 250
           L 370 252 C 220 258 100 270 28 282 Z"
        fill="url(#trail)"/>

  <!-- upper speed streak — thinner, offset -->
  <path d="M 55 204 C 140 214 268 228 370 234"
        stroke="url(#trail2)" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- lower speed streak -->
  <path d="M 55 296 C 140 286 268 272 370 266"
        stroke="url(#trail2)" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- ambient halo — the sky lit up by the approach -->
  <g filter="url(#glow)">
    <circle cx="400" cy="250" r="48" fill="#f59e0b" opacity="0.35"/>
  </g>

  <!-- comet head — bright, dense, inevitable -->
  <g filter="url(#softglow)">
    <circle cx="400" cy="250" r="52" fill="url(#core)"/>
  </g>

  <!-- white-hot center -->
  <circle cx="400" cy="250" r="18" fill="white"/>

</svg>

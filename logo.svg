<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- Face: bright center, deep edges — gives it density and weight -->
    <radialGradient id="face" cx="42%" cy="36%" r="64%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="55%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#5b0f6e"/>
    </radialGradient>
  </defs>

  <rect width="500" height="500" fill="#000000"/>

  <!-- speed trail — same hue as face, fading out left -->
  <line x1="18" y1="226" x2="90" y2="226" stroke="#d946ef" stroke-width="5"  stroke-linecap="round" opacity="0.30"/>
  <line x1="10" y1="252" x2="88" y2="252" stroke="#d946ef" stroke-width="9"  stroke-linecap="round" opacity="0.65"/>
  <line x1="18" y1="278" x2="90" y2="278" stroke="#d946ef" stroke-width="5"  stroke-linecap="round" opacity="0.30"/>

  <!-- CHARACTER — leaning into motion, face wider than tall (it's been compressed) -->
  <g transform="translate(278 252) rotate(-7)">

    <!-- face body -->
    <ellipse cx="0" cy="0" rx="178" ry="130" fill="url(#face)"/>

    <!-- WINK (our right) — cubic bezier lids, looks like a real closed eye -->
    <path d="M40 -30 C62 -56 98 -56 120 -30"
          stroke="#000" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M44 -26 C64 -14 96 -14 116 -26"
          stroke="#000" stroke-width="5"  stroke-linecap="round" fill="none" opacity="0.38"/>

    <!-- OPEN EYE (our left) — knowing, unblinking -->
    <ellipse cx="-75" cy="-22" rx="46" ry="34" fill="#000"/>
    <circle  cx="-75" cy="-22" r="20"           fill="#22d3ee"/>
    <circle  cx="-70" cy="-27" r="10"           fill="#000"/>
    <circle  cx="-60" cy="-34" r="5"            fill="white" opacity="0.95"/>
    <circle  cx="-81" cy="-16" r="2.5"          fill="white" opacity="0.45"/>

    <!-- EYEBROW — outer end yanked up, full sarcastic contempt -->
    <path d="M-118 -72 C-96 -104 -58 -102 -36 -88"
          stroke="#000" stroke-width="13" stroke-linecap="round" fill="none"/>

    <!-- SMIRK — one corner barely up, that's all it needs -->
    <path d="M-65 72 C-28 96 20 98 62 84"
          stroke="#000" stroke-width="10" stroke-linecap="round" fill="none"/>

  </g>
</svg>

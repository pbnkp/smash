<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- the screen glow — cold blue, the only light in the room -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e0f2fe" stop-opacity="1"/>
      <stop offset="18%"  stop-color="#38bdf8" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#0369a1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- speed trail gradient -->
    <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="crisp" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- the room: pure black -->
  <rect width="500" height="500" fill="#000000"/>

  <!-- speed — moving right, trail fades in from left -->
  <line x1="0"  y1="238" x2="155" y2="242" stroke="url(#trail)" stroke-width="3" stroke-linecap="round"/>
  <line x1="0"  y1="250" x2="158" y2="250" stroke="url(#trail)" stroke-width="5" stroke-linecap="round"/>
  <line x1="0"  y1="262" x2="155" y2="258" stroke="url(#trail)" stroke-width="3" stroke-linecap="round"/>

  <!-- the bloom — light spilling out before you even see the source -->
  <g filter="url(#bloom)">
    <circle cx="290" cy="250" r="80" fill="#0369a1" opacity="0.5"/>
  </g>

  <!-- the source — compressed, dense, the only thing that matters -->
  <g filter="url(#crisp)">
    <circle cx="290" cy="250" r="88" fill="url(#glow)"/>
  </g>

  <!-- the hard center — white hot, no blur, this is the work -->
  <circle cx="290" cy="250" r="26" fill="white"/>
  <circle cx="290" cy="250" r="16" fill="#e0f2fe"/>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <radialGradient id="iris" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#fef3c7"/>
      <stop offset="42%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="disc" cx="50%" cy="36%" r="60%">
      <stop offset="0%"   stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#000005"/>
    </radialGradient>
    <!-- eye glow — the hero of the whole mark -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="500" height="500" fill="#000000"/>

  <!-- speed — rightward motion, amber trail left -->
  <line x1="0"  y1="252" x2="46" y2="252" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.20"/>
  <line x1="0"  y1="268" x2="52" y2="268" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" opacity="0.50"/>
  <line x1="0"  y1="284" x2="46" y2="284" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.20"/>

  <!-- facial disc — deep indigo fading to black at edges -->
  <ellipse cx="250" cy="272" rx="192" ry="204" fill="url(#disc)"/>

  <!-- ear tufts — angular, not fluffy -->
  <path d="M148 136 L166 74 L210 138Z" fill="#0f0a2e"/>
  <path d="M352 136 L334 74 L290 138Z" fill="#0f0a2e"/>

  <!-- brow ridge — amber like the eyes, slight center raise = permanent "really?" -->
  <path d="M156 210 L186 198 L250 193 L314 198 L344 210"
        stroke="#f59e0b" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- LEFT EYE -->
  <g filter="url(#glow)">
    <circle cx="190" cy="268" r="54" fill="#000000"/>
    <circle cx="190" cy="268" r="41" fill="url(#iris)"/>
    <ellipse cx="190" cy="268" rx="15" ry="20" fill="#000000"/>
    <circle  cx="200" cy="255" r="7"  fill="white" opacity="0.95"/>
    <circle  cx="181" cy="277" r="3"  fill="white" opacity="0.30"/>
  </g>

  <!-- RIGHT EYE -->
  <g filter="url(#glow)">
    <circle cx="310" cy="268" r="54" fill="#000000"/>
    <circle cx="310" cy="268" r="41" fill="url(#iris)"/>
    <ellipse cx="310" cy="268" rx="15" ry="20" fill="#000000"/>
    <circle  cx="320" cy="255" r="7"  fill="white" opacity="0.95"/>
    <circle  cx="301" cy="277" r="3"  fill="white" opacity="0.30"/>
  </g>

  <!-- beak — sharp, authoritative, warm -->
  <path d="M235 322 L250 348 L265 322 Q250 314 235 322Z" fill="#92400e"/>

</svg>
